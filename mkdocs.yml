                  - Campos: mkt_ocr/technical/classes/ResUsers/fields.md
              - Res Config Settings:
                  - Descripción: mkt_ocr/technical/classes/ResConfig/index.md
                  - Campos: mkt_ocr/technical/classes/ResConfig/fields.md
