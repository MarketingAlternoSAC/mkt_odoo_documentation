site_name: Documentación Marketing Alterno Odoo
site_url: https://my-docs.com
theme:
  name: material
  font:
    text: Merriweather Sans
    code: Red Hat Mono
  logo: assets/logo.png
  # favicon: assets/favicon.ico
  features:
    # - navigation.footer
    - navigation.sections
    # - navigation.expand
    - toc.integrate
    - content.code.annotate
  palette:
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/eye-outline
        name: Dark mode
      primary: blue grey
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/eye
        name: Light mode
      primary: red
      accent: deep purple

nav:
